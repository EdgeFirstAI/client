sonar.organization=edgefirstai
sonar.projectKey=EdgeFirstAI_client
sonar.projectName=EdgeFirst Client
sonar.sources=.
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Mark test files explicitly - this excludes them from source analysis and issue reporting
sonar.test.inclusions=test/**/*.py,crates/*/tests/**/*,swift/EdgeFirstClientTests/**/*.swift

# Ignore issues in inline Rust test modules (blocks between #[cfg(test)] and closing brace)
sonar.issue.ignore.block=e1
sonar.issue.ignore.block.e1.beginBlockRegexp=^\\s*#\\[cfg\\(test\\)\\]
sonar.issue.ignore.block.e1.endBlockRegexp=^\\s*}\\s*$

# Python configuration
sonar.python.version=3.8,3.9,3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

# Rust configuration
# - lcov.info: Coverage from Rust unit tests and Python FFI tests (lint-and-test job)
# - rust-ffi-coverage.lcov: Coverage from Swift FFI tests (swift-test job, push to main only)
sonar.rust.lcov.reportPaths=lcov.info,rust-ffi-coverage.lcov

# Swift configuration (coverage from swift-test job)
# Note: Swift source files are generated during CI and downloaded as artifacts
sonar.swift.file.suffixes=.swift
# Use generic coverage format for Swift (sonar.swift.coverage.reportPaths expects llvm-cov show format, not lcov)
# The swift-coverage.xml is converted from lcov to SonarCloud generic format during CI
sonar.coverageReportPaths=swift-coverage.xml

# Fully exclude UniFFI-generated bindings from analysis. These are
# machine-generated by uniffi-bindgen and not meaningful to lint or
# coverage-report: the previous `sonar.issue.ignore.allfile` configuration
# did not take effect in PR analysis (Sonar still reported 48 code smells
# from EdgeFirstClient.swift on every PR), and the file's coverage path
# is also unreliable because the Swift xctest bundle is a separate binary
# from the instrumented FFI library. `sonar.exclusions` is the canonical
# way to mark generated code: it drops both the issues and the
# coverage-denominator contribution, which is what we want for a file
# nobody on the team authors.
sonar.exclusions=swift/EdgeFirstClient.swift,swift/EdgeFirstClientFFI.h,swift/EdgeFirstClientFFI.modulemap,swift/EdgeFirstClientFFI.framework/**,swift/EdgeFirstClient.xcframework/**

# Multicriteria issue ignores for specific false positives.
sonar.issue.ignore.multicriteria=cargolock

# text:S8570 wants Cargo.lock present alongside every Cargo.toml that
# declares dependencies. In a Cargo workspace, all member crates share a
# single Cargo.lock at the workspace root — there is no per-member
# lockfile by design, and Cargo enforces this rule. The Sonar text-rule
# applies its heuristic per Cargo.toml and so always misfires on every
# workspace member. Ignore the rule on member-crate manifests; the
# workspace-root Cargo.toml has no [dependencies] block and is unaffected.
sonar.issue.ignore.multicriteria.cargolock.ruleKey=text:S8570
sonar.issue.ignore.multicriteria.cargolock.resourceKey=crates/*/Cargo.toml

# Disable C/C++/Obj-C analysis
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Ignore duplicates in test files
sonar.cpd.exclusions=**/tests/**,**/test_*.py,test.py

# Ignore coverage for development scripts
sonar.coverage.exclusions=sonar.py
