name: SBOM Generation & License Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sbom-compliance:
    name: Generate SBOM & Check License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: 1.94

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install scancode-toolkit
        run: |
          python3 -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install scancode-toolkit

      - name: Install CycloneDX CLI
        run: |
          mkdir -p ~/.local/bin
          wget -q -O ~/.local/bin/cyclonedx \
            https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.27.1/cyclonedx-linux-x64
          # Verify SHA-256 checksum (from CycloneDX v0.27.1 release)
          echo "b36a12d5103c1fd799005e02ee8d5a546c8db5b67f770bb28786f15238ceac16  $HOME/.local/bin/cyclonedx" | sha256sum -c -
          chmod +x ~/.local/bin/cyclonedx
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Generate Complete SBOM
        run: .github/scripts/generate_sbom.sh

      - name: Validate SBOM Format
        run: cyclonedx validate --input-file sbom.json

      - name: Check License Policy
        run: python3 .github/scripts/check_license_policy.py sbom.json

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Fail on License Violations
        if: failure()
        run: |
          echo "❌ SBOM generation or license policy check failed!"
          echo "Review the output above for details."
          exit 1
